    <script>
        function updateStatusUI(player){
            //HP
            document.getElementById("hpBar").style.width =
            (player.status.hp / player.status.maxHp)*100+"%";
            document.getElementById("hpText").innerText =
            Math.round(player.status.hp) + " / " + Math.round(player.status.maxHp);

            //stamina
            document.getElementById("staminaBar").style.width =
            (player.status.stamina / player.status.maxStamina)*100+"%";
            document.getElementById("staminaText").innerText =
            player.status.stamina + " / " + player.status.maxStamina;

            //arousal
            document.getElementById("arousalBar").style.width =
            (player.status.arousal / player.status.maxArousal)*100+"%";
            document.getElementById("arousalText").innerText =
             Math.round(player.status.arousal) + " / " + Math.round(player.status.maxArousal);

            //trauma
            document.getElementById("traumaBar").style.width =
            (player.status.trauma / player.status.maxTrauma)*100+"%";
            document.getElementById("traumaText").innerText =
            player.status.trauma + " / " + player.status.maxTrauma;

            if (typeof normalizeBodyFluidState === "function"){
                normalizeBodyFluidState(player);
            }
            if (typeof normalizeAlcoholState === "function"){
                normalizeAlcoholState(player);
            }

            //alcohol
            player.status.alcohol = Number(player.status.alcohol) || 0;
            player.status.maxAlcohol = player.status.maxAlcohol || 100;
            document.getElementById("alcoholBar").style.width =
            (player.status.alcohol / player.status.maxAlcohol) * 100 + "%";
            document.getElementById("alcoholText").innerText =
            player.status.alcohol + " / " + player.status.maxAlcohol +
            " (" + getAlcoholLabel(player) + ")";

            //장비표시
            document.getElementById("weaponText").innerText =
            player.equipment.weapon?.name || "없음";
            document.getElementById("topText").innerText =
            player.equipment.top?.name || "없음";
            document.getElementById("braText").innerText =
            player.equipment.bra?.name || "없음";
            document.getElementById("bottomText").innerText =
            player.equipment.bottom?.name || "없음";
            document.getElementById("underwearText").innerText =
            player.equipment.underwear?.name || "없음";
            document.getElementById("accessary1Text").innerText =
            player.equipment.accessary1?.name || "없음";
            document.getElementById("accessary2Text").innerText =
            player.equipment.accessary2?.name || "없음";
            document.getElementById("accessary3Text").innerText =
            player.equipment.accessary3?.name || "없음";

            //소지금표시
            document.getElementById("goldText").innerText = player.gold;
            //시간표시
            const totalMinutes = player.time * 6;
            const hour = Math.floor(totalMinutes / 60) % 24;
            const minute = totalMinutes % 60;
            const day = getCurrentDay(player);
            const weekday = getWeekdayName(player);
            const date = getCalendarDate(player);
            const hourText = String(hour).padStart(2, "0");
            const minuteText = String(minute).padStart(2, "0");
            
            document.getElementById("timeText").innerHTML =
            `<div style="text-align:center;">
                [${date.month}/${date.day}]<br><br>
                ${day}일차 ${weekday} | ${hourText}:${minuteText}
            </div>`;

            //장소표시
            if (player.dungeon?.active && window.DUNGEONS){
                const dungeon = window.DUNGEONS[player.dungeon.id];
                const room = dungeon?.rooms[player.dungeon.room];
                            
                document.getElementById("locationText").innerText =
                `${dungeon?.name || "던전"} - ${room?.name || player.dungeon.room}`;
            } else {
                document.getElementById("locationText").innerText =
                LOCATIONS[player.location]?.name || player.location;
            }
        }

        function equipItem(player, item){
            const type = item.type;
            item.removed = false;
            item.lost = false;

            if (type === "accessary"){
                addLog("악세사리는 아래 슬롯 버튼으로 장착하세요.");
                return;
            }

            const prevItem=player.equipment[type];
            if (prevItem){
                player.inventory.push(prevItem);
            }
            player.equipment[type] = item;
            const index = player.inventory.indexOf(item);
            if (index !== -1){
                player.inventory.splice(index, 1);
            }
            updateDerivedStats(player);
            updateStatusUI(player);
            renderInventoryModal(player);
            localStorage.setItem("playerData", JSON.stringify(player));
        }

        function equipAccessary(player, item, slot){
            const prevItem = player.equipment[slot];
            
            if (prevItem){
                player.inventory.push(prevItem);
            }
            
            player.equipment[slot] = item;
            
            const index = player.inventory.indexOf(item);
            if (index !== -1){
                player.inventory.splice(index, 1);
            }
            
            updateDerivedStats(player);
            updateStatusUI(player);
            renderInventoryModal(player);
            savePlayer(player);
        }

        function getEquippedSlot(player, item){
            for (const [slot, equipped] of Object.entries(player.equipment)){
                if (equipped === item){
                    return slot;
                }
            }
            return null;
        }

        function isLockedEquipment(item){
            return item?.tags?.includes("locked");
        }

        function unequipItem(player, item){
            if (isLockedEquipment(item)){
                addLog("혼자서는 해제할 수 없다.");
                return;
            }

            const slot = getEquippedSlot(player, item);
            if (!slot) return;
            
            player.inventory.push(item);
            player.equipment[slot] = null;
            
            updateDerivedStats(player);
            updateStatusUI(player);
            renderInventoryModal(player);
            savePlayer(player);
        }

        function getSensitivityRank(value){
            const num = Number(value) || 0;
            if (num >= 350) return "S";
            if (num >= 300) return "A";
            if (num >= 200) return "B";
            if (num >= 100) return "C";
            if (num >= 50) return "D";
            return "E";
        }

        function getBattleTraitLabel(trait){
            const labels = {
                lucky: "행운",
                slippery: "약삭빠른",
                onemoretime: "지지않아",
                chanceattack: "예리한"
            };
            return labels[trait] || trait || "없음";
        }

        function getSexBattleTraitLabel(trait){
            const labels = {
                insensitiveM: "입둔감",
                insensitiveB: "가슴둔감",
                insensitiveC: "C둔감",
                insensitiveA: "엉덩이둔감"
            };
            return labels[trait] || trait;
        }

        function formatStatNumber(value){
            const num = Number(value) || 0;
            return Number.isInteger(num) ? String(num) : num.toFixed(1);
        }

        function escapeHtml(value){
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function getNpcSummary(npc){
            if (!npc || !npc.emotion) return "아직 잘 모르는 사이";

            const emotion = npc.emotion || {};
            const lines = npc.statusLines || [];

            for (const line of lines){
                // conditions가 정식 이름. condtions는 오타로 써둔 기존 데이터도 임시 호환.
                const conditions = line.conditions || line.condtions || [];
                if (!conditions.length) continue;

                const matched = conditions.every(condition => {
                    const value = Number(emotion[condition.emotion]) || 0;
                    const min = condition.min ?? -Infinity;
                    const max = condition.max ?? Infinity;
                    return value >= min && value <= max;
                });

                if (matched){
                    return line.text || "아직 특별한 감정 변화는 없다.";
                }
            }

            return npc.defaultStatusLine || "아직 특별한 감정 변화는 없다.";
        }

        function getNpcStore(){
            if (typeof NPC_DATA !== "undefined") return NPC_DATA;
            window.NPC_DATA = window.NPC_DATA || {};
            return window.NPC_DATA;
        }

        function renderStatusWindow(){
            if (!player){
                document.getElementById("statusWindowContent").innerHTML = '<p class="empty-text">플레이어 데이터를 찾을 수 없습니다.</p>';
                return;
            }

            if (typeof updateDerivedStats === "function"){
                updateDerivedStats(player);
            }

            const sexual = player.sexualTraits || {};
            const stats = player.stats || {};
            const derived = player.derivedStats || {};
            const battleTraits = player.sexBattleTraits || [];
            const hairText = [player.hair?.length, player.hair?.color ? `${player.hair.color} 머리` : ""].filter(Boolean).join(" ");

            document.getElementById("statusWindowContent").innerHTML = `
            <div class="status-tabs">
                <button onclick="showStatusTab('info')">기본정보</button>
                <button onclick="showStatusTab('quest')">퀘스트</button>
                <button onclick="showStatusTab('npc')">NPC 관계</button>
                </div>
                
            <div id="tab-info" class="status-tab"></div>
            <div id="tab-quest" class="status-tab" style="display:none;"></div>
            <div id="tab-npc" class="status-tab" style="display:none;"></div>
            `;
            
            renderInfoTab(player);
            renderQuestTab(player);
            renderNpcTab();
            showStatusTab("info");
        }

        function showStatusTab(tab){
            document.getElementById("tab-info").style.display = "none";
            document.getElementById("tab-quest").style.display = "none";
            document.getElementById("tab-npc").style.display = "none";
            document.getElementById("tab-" + tab).style.display = "flex";
        }

        function renderInfoTab(player){
            const sexual = player.sexualTraits || {};
            const stats = typeof calculateTotalStats === "function"
            ? calculateTotalStats(player)
            : (player.stats || {});
            const derived = player.derivedStats || {};
            
            document.getElementById("tab-info").innerHTML = `
            <div class="detail-card">
                <h4>스탯</h4>
                <p>레벨: ${player.level ?? 1}</p>
                <p>경험치: ${player.exp ?? 0} / ${typeof getExpToNextLevel === "function" ? getExpToNextLevel(player.level ?? 1) : "?"}</p>
                <p>스탯 포인트: ${player.statPoints ?? 0}</p>
                <hr>
                <p>근력: ${stats.str}</p>
                <p>민첩: ${stats.dex}</p>
                <p>지력: ${stats.int}</p>
                <p>매력: ${stats.charm}</p>
                <hr>
                <p>공격력: ${formatStatNumber(derived.atk)}</p>
                <p>방어력: ${formatStatNumber(derived.def)}</p>
                <p>회피율: ${formatStatNumber(derived.eva)}</p>
                <p>마력: ${formatStatNumber(derived.mag)}</p>
                ${derived.bodyFluidPenalty ? `<p>흔적 페널티: 회피 -${derived.bodyFluidPenalty}</p>` : ""}
            </div>

            ${renderTraitSection(player)}
            ${renderBodySection(player, sexual)}
            `;
        }

        function renderBodySection(player, sexual){
            return `
            <div class="detail-card">
                <h4>신체 특성</h4>
                
                <div class="body-grid">
                    ${renderBodyPart("M", sexual.mSize, sexual.mSensitivity)}
                    ${renderBodyPart("B", sexual.bSize, sexual.bSensitivity)}
                    ${renderBodyPart("C", sexual.cSize, sexual.cSensitivity, player.gender === "female" ? sexual.cTightness : undefined)}
                    ${renderBodyPart("A", sexual.aSize, sexual.aSensitivity, sexual.aTightness)}
                    </div>
                ${renderBodyFluidSection(player)}
                </div>
            `;
        }

        function renderTraitSection(player){
            const battleTrait =
            getBattleTraitLabel(player.battleTrait);
            
            const sexTraits =
            (player.sexBattleTraits || [])
            .map(getSexBattleTraitLabel)
            .join(", ") || "없음";
            
            return `
            <div class="detail-card">
                <h4>특별한 특성</h4>
                <p>전투 특성: ${battleTrait}</p>
                <p>성적 특성: ${sexTraits}</p>
                </div>
                `;
            }

        function renderBodyFluidSection(player){
            if (typeof normalizeBodyFluidState === "function") normalizeBodyFluidState(player);
            const fluid = player.status?.bodyFluid || { a: 0, m: 0, c: 0 };
            const total = (fluid.a || 0) + (fluid.m || 0) + (fluid.c || 0);
            const level = typeof getBodyFluidDebuffLevel === "function" ? getBodyFluidDebuffLevel(player) : 0;

            const statusTexts =
            typeof getBodyFluidStatusText === "function"
            ? getBodyFluidStatusText(player)
            : [];
            
            return `
            
            <div class="body-card">
                <h5>남은 흔적</h5>
                <p>A: ${fluid.a || 0}</p>
                <p>M: ${fluid.m || 0}</p>
                <p>C: ${fluid.c || 0}</p>
                <p>총량: ${total}</p>
                <p>위험 단계: ${level}</p>
                
                ${
                statusTexts.length > 0
                ? `
                <hr>
                <div class="body-fluid-status">
                    ${statusTexts.map(text => `<p>${text}</p>`).join("")}
                    </div>
                    `
                    : ""
                    }
            </div>
            `;
        }

        function renderBodyPart(label, size, sens, tight){
            return `
            <div class="body-card">
                <h5>${label}</h5>
                <p>크기: ${size || "-"}</p>
                ${tight !== undefined ? `<p>조임도: ${tight}</p>` : ""}
                <p>민감도: ${sens} (${getSensitivityRank(sens)})</p>
            </div>
            `;
        }

        function renderQuestTab(player){
            initQuestData(player);
            
            const tab = document.getElementById("tab-quest");
            
            tab.innerHTML = `
            <div class="detail-card">
                <h4>퀘스트</h4>
                ${renderMainQuestStatus(player)}
                </div>
                
            <div class="detail-card">
                <h4>NPC 퀘스트</h4>
                ${renderNpcQuestStatus(player)}
                </div>
                `;
        }

        function renderMainQuestStatus(player){
            const active = player.quest.active;
            if (!active){
                return `<p class="empty-text">진행 중인 퀘스트가 없습니다.</p>`;
            }            
            const quest = findQuest(active.id);

            if (!quest){
                return `<p class="empty-text">알 수 없는 퀘스트입니다.</p>`;
            }
            return `
            <p><b>${quest.title}</b></p>
            ${renderQuestProgressText(player, active, quest)}
            `;
        }

        function renderNpcQuestStatus(player){
            const subActive = player.quest.subActive || [];

            if (subActive.length === 0){
                return `<p class="empty-text">진행 중인 NPC 퀘스트가 없습니다.</p>`;
            }
            
            return subActive.map(active => {
                const quest = findQuest(active.id);
                if (!quest) return "";
                
                return `
                <div class="body-card">
                    <h5>${quest.title}</h5>
                    <p>의뢰인: ${quest.giver || "-"}</p>
                    ${renderQuestProgressText(player, active, quest)}
                    </div>
                    `;
                }).join("");
            }

            function renderQuestProgressText(player, active, quest){
                if (quest.type === "collect"){
                    const count = countItem(player, quest.requiredItem);
                    const required = quest.requiredCount || 1;
                    
                    if (count >= required){
                        return `
                        <p>진행도: ${count} / ${required}</p>
                        <p class="quest-ready">물건을 가지고 있다! 가져다주자!</p>
                        `;
                    }
                    return `<p>진행도: ${count} / ${required}</p>`;
                }
                
                const max =
                quest.requiredKill ||
                quest.requiredCount ||
                1;
                
                return `<p>진행도: ${active.progress || 0} / ${max}</p>`;
            }

        function renderNpcTab(){
            const npcEntries = Object.entries(getNpcStore() || {});
            const tab = document.getElementById("tab-npc");
            
            if (!npcEntries.length){
                tab.innerHTML = '<p class="empty-text">아직 확인할 수 있는 NPC 데이터가 없습니다.</p>';
                return;
            }
            
            const major = npcEntries.filter(([key, npc]) => npc.type !== "minor");
            const minor = npcEntries.filter(([key, npc]) => npc.type === "minor");
            
            tab.innerHTML = `
            <h4 class="npc-section-title">주요 인물</h4>
            <div class="npc-grid">
                ${major.map(([key, npc]) => renderNpcCard(npc, key)).join("")}
                </div>
                
                <h4 class="npc-section-title">기타 인물</h4>
                <div class="minor-npc-list">
                    ${minor.map(([key, npc]) => renderMinorNpcLine(npc, key)).join("")}
                    </div>
                    `;
                }

        function renderNpcCard(npc, key){
            const e = npc.emotion || {};
            const badge = getNpcRelationshipBadge(npc);
            return `
            
            <div class="npc-card">
                <h4>${escapeHtml(npc.name || key || "이름 없음")}${badge ? " " + badge : ""}</h4>
                ${renderHeartBar(e.affection)}
                ${renderBar("lust", e.lust)}
                ${renderBar("fear", e.fear)}
                <p class="npc-line">${getNpcSummary(npc)}</p>
            </div>
            `;
        }

        function renderMinorNpcLine(npc, key){
            const badge = getNpcRelationshipBadge(npc);
            return `
            <div class="minor-npc-line">
                <b>${escapeHtml(npc.name || key || "이름 없음")}${badge ? " " + badge : ""}</b>
                <p>${escapeHtml(getNpcSummary(npc))}</p>
            </div>
            `;
        }

        function renderHeartBar(value){
            const num = Number(value) || 0;
            const percent = Math.max(0, Math.min(num, 100));
            return `
            <div class="emotion-row">
                <span class="emotion-label">affection</span>

                <div class="heart-meter">
                    <div class="heart-empty">♥</div>
                    <div class="heart-full-wrap" style="height:${percent}%">
                        <div class="heart-full">♥</div>
                    </div>
                </div>
                
                <span class="emotion-value">${formatStatNumber(num)}</span>
            </div>
            `;
        }

        function renderBar(type, value){
            const num = Number(value) || 0;
            const percent = Math.max(0, Math.min(num, 100));
            
            const labelMap = {
                lust: "lust",
                fear: "fear"
            };
            
            return `
            
            <div class="emotion-row">
            <span class="emotion-label">${labelMap[type] || type}</span>
            <div class="emotion-bar ${type}">
                <div class="emotion-fill" style="width:${percent}%"></div>
            </div>
            <span class="emotion-value">${formatStatNumber(num)}</span>
            </div>
            `;
        }

        function openStatusWindow(){
            renderStatusWindow();
            document.getElementById("statusModal").style.display = "flex";
        }

        function closeStatusWindow(){
            document.getElementById("statusModal").style.display = "none";
        }

        function toggleSidebar(){
            const sidebar = document.getElementById("sidebar");
            const btn = document.getElementById("toggleBtn");

            sidebar.classList.toggle("closed");

            if (sidebar.classList.contains("closed")){
                btn.innerText = "▶";
            } else {
                btn.innerText = "◀";
            }
        }

        const SAVE_SLOT_COUNT = 5;
        let currentSaveSlotMode = "load";

        function getSaveSlotKey(slot){
            return `sotfSaveSlot${slot}`;
        }

        function getSaveSlotData(slot){
            const raw = localStorage.getItem(getSaveSlotKey(slot));
            if (!raw) return null;
            try {
                return JSON.parse(raw);
            } catch (error){
                console.error(`슬롯 ${slot} 파싱 실패`, error);
                return { broken: true };
            }
        }

        function getManualSaveBlockedMessage(){
            if (player?.mineRun){
                return "광산 안에서는 저장할 수 없습니다.\n광산을 나간 뒤 저장해주세요.";
            }
            
            if (player?.flags?.arena_run_active){
                return "아레나 진행 중에는 저장할 수 없습니다.\n아레나가 끝난 뒤 저장해주세요.";
            }
            
            return null;
        }
        
        function checkManualSaveAllowed(){
            const message = getManualSaveBlockedMessage();
            
            if (message){
                alert(message);
                return false;
            }
            
            return true;
        }

        function makeSavePayload(slot){
            const npcProgress = getNpcProgressSaveData();
            return {
                version: 2,
                slot,
                savedAt: new Date().toISOString(),
                playerData: structuredClone(player),
                npcData: structuredClone(npcProgress)
            };
        }

        function formatSaveDate(iso){
            if (!iso) return "저장 시간 없음";
            const date = new Date(iso);
            if (Number.isNaN(date.getTime())) return iso;
            return date.toLocaleString("ko-KR", {
                year: "numeric", month: "2-digit", day: "2-digit",
                hour: "2-digit", minute: "2-digit"
            });
        }

        function openSaveSlotModal(mode = "load"){
            if (mode === "save" && !checkManualSaveAllowed()){
                return;
            }
            currentSaveSlotMode = mode;
            const modal = document.getElementById("saveSlotModal");
            const title = document.getElementById("saveSlotTitle");
            const hint = document.getElementById("saveSlotHint");
            const list = document.getElementById("saveSlotList");

            title.textContent = mode === "save" ? "저장 슬롯 선택" : "불러올 슬롯 선택";
            hint.textContent = mode === "save"
                ? "저장할 슬롯을 선택하세요. 기존 데이터가 있으면 덮어씁니다."
                : "불러올 세이브 슬롯을 선택하세요.";

            list.innerHTML = "";
            for (let slot = 1; slot <= SAVE_SLOT_COUNT; slot++){
                const data = getSaveSlotData(slot);
                const playerName = data?.playerData?.name || "빈 슬롯";
                const savedAt = data?.broken ? "손상된 세이브" : (data ? formatSaveDate(data.savedAt) : "저장 데이터 없음");
                const location = data?.playerData?.location || data?.playerData?.locationId || "-";

                const btn = document.createElement("button");
                btn.className = `save-slot-card ${data ? "has-save" : "empty-save"}`;
                btn.innerHTML = `
                    <span class="save-slot-number">SLOT ${slot}</span>
                    <span class="save-slot-name">${playerName}</span>
                    <span class="save-slot-meta">${savedAt}</span>
                    <span class="save-slot-meta">위치: ${location}</span>
                `;
                btn.onclick = () => mode === "save" ? saveGame(slot) : loadGame(slot);
                list.appendChild(btn);
            }

            modal.style.display = "flex";
        }

        function closeSaveSlotModal(){
            document.getElementById("saveSlotModal").style.display = "none";
        }

        function saveGame(slot){
            if (!checkManualSaveAllowed()){
                closeSaveSlotModal();
                return;
            }
            
            if (!slot){
                openSaveSlotModal("save");
                return;
            }
            if (!player){
                alert("저장할 플레이어 데이터가 없습니다.");
                return;
            }

            try {
                const payload = makeSavePayload(slot);
                saveToLocalStorage(getSaveSlotKey(slot), payload);
                closeSaveSlotModal();
                alert(`슬롯 ${slot}에 저장했습니다.`);
            } catch (error){
                console.error(error);
                alert("저장에 실패했습니다. 브라우저 콘솔을 확인해주세요.");
            }
        }

        function downloadCurrentJsonBackup(){
            if (!checkManualSaveAllowed()){
                return;
            }
            
            if (!player){
                alert("다운로드할 플레이어 데이터가 없습니다.");
                return;
            }

            try {
                const payload = makeSavePayload(null);
                downloadSaveFile(payload);
            } catch (error){
                console.error(error);
                alert("JSON 파일 다운로드에 실패했습니다. 브라우저 콘솔을 확인해주세요.");
            }
        }

        function loadGame(slot){
            if (!slot){
                openSaveSlotModal("load");
                return;
            }

            const slotData = getSaveSlotData(slot);
            if (!slotData || slotData.broken || !slotData.playerData){
                alert(`슬롯 ${slot}에 저장된 데이터가 없습니다.`);
                return;
            }

            try {
                const save = slotData;
                player = normalizePlayer(save.playerData || save.player || save);
                saveToLocalStorage("playerData", player);

                if (save.npcData){
                    saveToLocalStorage("npcData", save.npcData);
                    applyNpcProgressSaveData(save.npcData);
                } else {
                    localStorage.removeItem("npcData");
                    applyNpcProgressSaveData(null);
                }

                refreshAfterLoad();
                closeSaveSlotModal();
                alert(`슬롯 ${slot} 데이터를 불러왔습니다.`);
            } catch (error){
                console.error(error);
                alert("불러오기에 실패했습니다. 저장 데이터가 손상되었을 수 있습니다.");
            }
        }

        function refreshAfterLoad(){
            player.inBattle = false;
            
            if (typeof battleState !== "undefined") {
                battleState = null;
            }
            
            const battleUI = document.getElementById("battleUI");
            if (battleUI) {
                battleUI.innerHTML = "";
                battleUI.style.display = "none";
            }
            
            const storyArea = document.getElementById("storyArea");
            if (storyArea) storyArea.style.display = "block";
            
            const storyText = document.getElementById("storyText");
            const choiceArea = document.getElementById("choiceArea");
            const storyBtn = document.getElementById("storyBtn");
            
            if (storyText) storyText.innerHTML = "";
            if (choiceArea) choiceArea.innerHTML = "";
            if (choiceArea) choiceArea.style.display = "block";
            if (storyBtn) storyBtn.style.display = "block";
            
            updateDerivedStats(player);
            updateStatusUI(player);
            renderInventoryModal(player);
            
            if (document.getElementById("statusModal").style.display !== "none"){
                renderStatusWindow();
            }

            if (player.tavernWork?.active){
                player.currentScene = null;
                localStorage.setItem("playerData", JSON.stringify(player));
                renderMap(player);
                startTavernWork(player);
                return;
            }
            
            if (player.inEvent && player.subwayEvent){
                showSubwayTurn(player);
                return;
            }

            if (player.currentScene?.active){
                if (resumeCurrentScene(player)) return;
                
                startScene(player.currentScene.scene, player, {
                    resumeIndex: getSafeResumeIndex(player.currentScene.scene, player.currentScene.index)
                });
                return;
            }
                        
            if (player.dungeon?.active){
                renderMap(player);
                startScene(buildDungeonScene(player), player, { noSaveScene: true });
                return;
            }
            
            if (player.currentScene?.active){
                startScene(player.currentScene.scene, player, {
                    resumeIndex: getSafeResumeIndex(player.currentScene.scene, player.currentScene.index)
                });
                return;
            }
            startScene(getLocationScene(player), player);
        }

        function openSaveFilePicker(){
            document.getElementById("saveFileInput").click();
        }

        function loadGameFromFile(event){
            const file = event.target.files?.[0];
            event.target.value = "";
            if (!file) return;

            const reader = new FileReader();
            reader.onload = () => {
                try {
                    const save = JSON.parse(reader.result);
                    const loadedPlayer = save.playerData || save.player || save;
                    const loadedNpc = save.npcData || null;

                    player = normalizePlayer(loadedPlayer);
                    saveToLocalStorage("playerData", player);

                    if (loadedNpc){
                        saveToLocalStorage("npcData", loadedNpc);
                        applyNpcProgressSaveData(loadedNpc);
                    }

                    refreshAfterLoad();
                    alert("세이브 파일을 불러왔습니다.");
                } catch (error){
                    console.error(error);
                    alert("세이브 파일을 불러오지 못했습니다.");
                }
            };
            reader.readAsText(file);
        }

        function getNpcProgressSaveData(){
            const saveData = {};
            const npcStore = getNpcStore();

            for (const [key, npc] of Object.entries(npcStore || {})){
                saveData[key] = {
                    emotion: { ...(npc.emotion || {}) },
                    flags: { ...(npc.flags || {}) },
                    events: { ...(npc.events || {}) },
                    relationship: npc.relationship || null
                };
            }
            return saveData;
        }

        function applyNpcProgressSaveData(savedNpcData){
            if (!savedNpcData) return;
            const npcStore = getNpcStore();

            for (const [key, savedNpc] of Object.entries(savedNpcData)){
                if (!npcStore[key]) continue;

                npcStore[key].emotion = {
                    ...(npcStore[key].emotion || {}),
                    ...(savedNpc.emotion || {})
                };

                npcStore[key].flags = {
                    ...(npcStore[key].flags || {}),
                    ...(savedNpc.flags || {})
                };

                npcStore[key].events = {
                    ...(npcStore[key].events || {}),
                    ...(savedNpc.events || {})
                };

                npcStore[key].relationship =
                 savedNpc.relationship !== undefined
                 ? savedNpc.relationship
                 : null;
            }
        }

        function shakeScreen(duration = 400){
            document.body.classList.add("shake");
            setTimeout(() => {
                document.body.classList.remove("shake");
            }, duration);
        }


        window.addEventListener("click", (event) => {
            const modal = document.getElementById("statusModal");
            if (event.target === modal){
                closeStatusWindow();
            }
        });

        window.addEventListener("keydown", (event) => {
            if (event.key === "Escape"){
                closeStatusWindow();
            }
        });
    </script>

        #shopModal{

        .status-modal{
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.78);

            justify-content: center;
            padding: 24px;

        }

        .status-window{

        .emotion-grid{

            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));

        .emotion-value{

            border: 1px solid #555;

        .emotion-fill{
            height: 100%;
            transition: width 0.3s ease;

        .emotion-bar.lust .emotion-fill{

        .emotion-bar.fear .emotion-fill{

        .heart-full-wrap{

            width: min(560px, 100%);
            background: linear-gradient(180deg, #1c1c1c, #101010);

        .save-slot-header{
            display: flex;

            justify-content: space-between;

            margin: 0;
            font-size: 20px;
            letter-spacing: -0.02em;

        .save-slot-close{
            width: 34px;
            height: 34px;
            min-width: 34px;

            font-size: 20px;

            margin: 0;
            padding: 16px 18px;
            background: rgba(24,24,24,0.96);
            border-bottom: 1px solid #444;
        }

        .status-window-header h3{
            margin: 0;
            white-space: nowrap;
            font-size: 20px;
            letter-spacing: -0.02em;
        }

        .close-status-btn{
            width: auto;
            min-width: 54px;
            margin: 0;
            padding: 7px 12px;
            flex: 0 0 auto;
            border-radius: 999px;
            background: #2b2b2b;
            border: 1px solid #666;
            font-size: 13px;

        .close-status-btn:hover{
            background: #3a3a3a;

        .status-window-content{

                padding: 12px;

        #flashOverlay {
            position: fixed;
            top: 0;
            left: 0;

            pointer-events: none;
            z-index: 9999;

            animation: flashEffect 0.6s ease-in-out;

        @keyframes flashEffect {
            0%   { opacity: 0; }
            20%  { opacity: 1; }
            50%  { opacity: 0.5; }
            100% { opacity: 0; }
